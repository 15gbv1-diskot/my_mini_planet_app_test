<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arma Reforger 1.7 — Снайперский калькулятор ветра</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #262626;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            border: 1px solid #3a3a3a;
        }
        h2 {
            text-align: center;
            color: #ffb300;
            margin-top: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex: 1;
            accent-color: #ffb300;
        }
        input[type="number"], select {
            width: 80px;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 5px;
            border-radius: 4px;
            text-align: center;
        }
        select {
            width: 100%;
            padding: 8px;
            font-size: 0.95rem;
        }
        .result-box {
            background-color: #1f1f1f;
            border-left: 4px solid #ffb300;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .result-line:last-child {
            margin-bottom: 0;
        }
        .highlight {
            color: #ffb300;
            font-weight: bold;
        }
        .result-value {
            color: #00ff00;
            font-weight: bold;
            font-size: 1.2rem;
        }
        /* Стили визуального прицела */
        .scope-container {
            margin-top: 25px;
            background-color: #111;
            border: 2px solid #444;
            border-radius: 8px;
            height: 200px;
            position: relative;
            overflow: hidden;
        }
        .scope-title {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            z-index: 5;
        }
        .scope-info {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.7rem;
            color: #666;
            z-index: 5;
        }
        /* Статичная цель по центру */
        .target {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background-color: #ff3333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            box-shadow: 0 0 12px #ff3333;
        }
        .target-label {
            position: absolute;
            top: calc(50% + 20px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #ff3333;
            font-weight: bold;
            z-index: 2;
        }
        /* Динамическая сетка прицела */
        .reticle-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 3;
        }
        .reticle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 600px;
            height: 100%;
            transform: translateX(-50%);
            transition: left 0.15s ease-out;
            pointer-events: none;
        }
        /* Центральный перекресток сетки */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .crosshair-line {
            position: absolute;
            background-color: rgba(0, 255, 0, 0.8);
        }
        .crosshair-line-v {
            width: 2px;
            height: 30px;
            top: -15px;
            left: -1px;
        }
        .crosshair-line-h {
            width: 30px;
            height: 2px;
            top: -1px;
            left: -15px;
        }
        /* Горизонтальная шкала рисок (MRAD) */
        .mrad-scale {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(0, 255, 0, 0.15);
        }
        .tick {
            position: absolute;
            top: -6px;
            width: 2px;
            height: 12px;
            background-color: rgba(0, 255, 0, 0.6);
        }
        .tick-long {
            height: 18px;
            top: -9px;
        }
        .tick-label {
            position: absolute;
            top: -24px;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(0, 255, 0, 0.7);
            font-family: 'Courier New', monospace;
        }
        .arrow-indicator {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #ffb300;
            font-weight: bold;
            z-index: 5;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #ffb300;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 Калькулятор ветра Arma Reforger</h2>
    
    <div class="form-group">
        <label for="weapon">Оружие / Калибр:</label>
        <select id="weapon" onchange="calculate()">
            <option value="30">.338 Lapua Magnum / .50 BMG (Константа 30)</option>
            <option value="12" selected>7.62×54 СВД / 7.62×51 M21 (Константа 12)</option>
            <option value="18">5.56×45 / 5.45×39 (Константа 18)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Дистанция до цели: <span id="dist-val" class="highlight">1200</span> м</label>
        <div class="input-row">
            <input type="range" id="dist" min="50" max="1500" step="50" value="1200" oninput="updateValues()">
        </div>
    </div>

    <div class="form-group">
        <label>Азимут стрельбы (цели): <span id="target-val" class="highlight">265</span>°</label>
        <div class="input-row">
            <input type="range" id="target_azim" min="0" max="360" step="1" value="265" oninput="updateValues()">
        </div>
    </div>

    <div class="form-group">
        <label>Направление ветра (откуда дует): <span id="wind-dir-val" class="highlight">340</span>°</label>
        <div class="input-row">
            <input type="range" id="wind_azim" min="0" max="360" step="1" value="340" oninput="updateValues()">
        </div>
    </div>

    <div class="form-group">
        <label>Скорость ветра: <span id="wind-speed-val" class="highlight">5</span> м/с</label>
        <div class="input-row">
            <input type="range" id="wind_speed" min="0" max="15" step="0.5" value="5" oninput="updateValues()">
        </div>
    </div>

    <div class="result-box">
        <div class="result-line"><span>🌬️ Угол ветра к пуле:</span> <span id="res-angle" class="highlight">0°</span></div>
        <div class="result-line"><span>💨 Боковой ветер (Crosswind):</span> <span id="res-crosswind" class="highlight">0 м/с</span></div>
        <div class="result-line"><span>📐 Поправка на ветер:</span> <span id="res-mrad" class="result-value">0.0 MRAD</span></div>
        <div class="result-line"><span>🎯 Куда выносить прицел:</span> <span id="res-action" style="color: #00ff00; font-weight: bold;">-</span></div>
    </div>

    <!-- Визуализатор прицела -->
    <div class="scope-container">
        <div class="scope-title">🔭 Сетка прицела (Holdover)</div>
        <div class="scope-info" id="scope-info">MRAD</div>
        <div class="target"></div>
        <div class="target-label">🎯 ЦЕЛЬ</div>
        
        <div class="reticle-wrapper">
            <div class="reticle" id="reticle">
                <div class="mrad-scale"></div>
                <div class="crosshair">
                    <div class="crosshair-line crosshair-line-v"></div>
                    <div class="crosshair-line crosshair-line-h"></div>
                </div>
                <div id="ticks-container"></div>
            </div>
        </div>
        <div class="arrow-indicator" id="arrow-indicator">➡️ Вынос вправо</div>
    </div>
</div>

<script>
    // Константы
    const pixelsPerMrad = 40;
    const CENTER_OFFSET = 300; // Смещение центра в пикселях

    // Генерация шкалы милов (от -5 до +5 MRAD)
    function generateScale() {
        const container = document.getElementById('ticks-container');
        container.innerHTML = '';
        
        for (let i = -5; i <= 5; i++) {
            if (i === 0) continue;
            const leftPosition = CENTER_OFFSET + (i * pixelsPerMrad);
            
            // Риска
            const tick = document.createElement('div');
            tick.className = 'tick' + (Math.abs(i) % 2 === 0 ? ' tick-long' : '');
            tick.style.left = leftPosition + 'px';
            
            // Цифра над риской
            const label = document.createElement('div');
            label.className = 'tick-label';
            label.style.left = leftPosition + 'px';
            label.innerText = i > 0 ? '+' + i : i;
            
            container.appendChild(tick);
            container.appendChild(label);
        }
    }
    generateScale();

    function updateValues() {
        document.getElementById('dist-val').innerText = document.getElementById('dist').value;
        document.getElementById('target-val').innerText = document.getElementById('target_azim').value;
        document.getElementById('wind-dir-val').innerText = document.getElementById('wind_azim').value;
        document.getElementById('wind-speed-val').innerText = document.getElementById('wind_speed').value;
        calculate();
    }

    function calculate() {
        // Получаем значения
        const dist = parseFloat(document.getElementById('dist').value);
        const targetAzim = parseFloat(document.getElementById('target_azim').value);
        const windAzim = parseFloat(document.getElementById('wind_azim').value);
        const windSpeed = parseFloat(document.getElementById('wind_speed').value);
        const constant = parseFloat(document.getElementById('weapon').value);

        // 1. Расчет относительного угла ветра (нормализация)
        let windAngle = windAzim - targetAzim;
        // Приводим к диапазону [-180, 180]
        while (windAngle > 180) windAngle -= 360;
        while (windAngle < -180) windAngle += 360;

        // 2. Расчет чистого бокового ветра
        const angleRad = windAngle * (Math.PI / 180);
        const crosswind = windSpeed * Math.sin(angleRad);

        // 3. Формула ветра (MRAD)
        const distHundreds = dist / 100;
        let mradCorrection = (distHundreds * crosswind) / constant;
        mradCorrection = Math.round(mradCorrection * 10) / 10; // Округляем до 0.1

        // 4. Обновляем текстовые результаты
        const windDirText = windAngle > 5 ? 'справа' : (windAngle < -5 ? 'слева' : 'по оси');
        document.getElementById('res-angle').innerHTML = Math.abs(Math.round(windAngle)) + '° ' + windDirText;
        document.getElementById('res-crosswind').innerHTML = Math.abs(crosswind).toFixed(1) + ' м/с';
        document.getElementById('res-mrad').innerHTML = Math.abs(mradCorrection).toFixed(1) + ' MRAD';

        // 5. Обновляем визуализацию сетки
        const reticle = document.getElementById('reticle');
        const arrowIndicator = document.getElementById('arrow-indicator');
        
        // Максимальное смещение ограничиваем 5 MRAD (200px)
        const maxShift = 5 * pixelsPerMrad;
        let shiftPx = mradCorrection * pixelsPerMrad;
        shiftPx = Math.max(-maxShift, Math.min(maxShift, shiftPx));

        if (Math.abs(mradCorrection) < 0.05) {
            // Ветер отсутствует или очень слабый
            document.getElementById('res-action').innerHTML = '🎯 Целься строго по центру';
            document.getElementById('res-action').style.color = '#ffb300';
            arrowIndicator.style.display = 'none';
            reticle.style.left = '50%';
        } else if (mradCorrection > 0) {
            // Ветер справа -> Пулю снесет влево -> Выносим сетку ВПРАВО
            document.getElementById('res-action').innerHTML = '➡️ Вынеси прицел ПРАВЕЕ на ' + Math.abs(mradCorrection).toFixed(1) + ' MRAD';
            document.getElementById('res-action').style.color = '#00ff00';
            arrowIndicator.style.display = 'block';
            arrowIndicator.innerHTML = '➡️ Вынос вправо на ' + Math.abs(mradCorrection).toFixed(1) + ' MRAD';
            arrowIndicator.style.color = '#00ff00';
            // Смещаем сетку вправо (положительный сдвиг)
            reticle.style.left = `calc(50% + ${shiftPx}px)`;
        } else {
            // Ветер слева -> Пулю снесет вправо -> Выносим сетку ВЛЕВО
            document.getElementById('res-action').innerHTML = '⬅️ Вынеси прицел ЛЕВЕЕ на ' + Math.abs(mradCorrection).toFixed(1) + ' MRAD';
            document.getElementById('res-action').style.color = '#00ff00';
            arrowIndicator.style.display = 'block';
            arrowIndicator.innerHTML = '⬅️ Вынос влево на ' + Math.abs(mradCorrection).toFixed(1) + ' MRAD';
            arrowIndicator.style.color = '#00ff00';
            // Смещаем сетку влево (отрицательный сдвиг)
            reticle.style.left = `calc(50% + ${shiftPx}px)`;
        }

        // Обновляем информацию о калибре
        const weaponSelect = document.getElementById('weapon');
        document.getElementById('scope-info').textContent = weaponSelect.options[weaponSelect.selectedIndex].text.split('(')[0].trim();
    }

    // Первый запуск при открытии страницы
    window.onload = function() {
        updateValues();
    };

    // Обновление при изменении оружия
    document.getElementById('weapon').addEventListener('change', calculate);
</script>

</body>
</html>
