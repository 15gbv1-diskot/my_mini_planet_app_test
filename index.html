<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>My Mini Planet - 3D Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #000;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .stats-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            gap: 15px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .action-buttons {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 15px;
        }

        button {
            background: linear-gradient(135deg, rgba(30,40,70,0.95), rgba(20,25,50,0.95));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100,150,255,0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .message-area {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 10px 20px;
            text-align: center;
            color: #ffdd88;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.3s;
            white-space: nowrap;
            font-weight: bold;
            border: 1px solid rgba(255,255,100,0.3);
        }

        .chat-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,15,30,0.98);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            z-index: 100;
            pointer-events: auto;
            border: 2px solid rgba(100,150,255,0.5);
            min-width: 280px;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .chat-modal input, .chat-modal textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(100,150,255,0.5);
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }

        .chat-modal button {
            margin-top: 10px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .stats-panel { padding: 8px 16px; gap: 8px; top: 10px; font-size: 0.8rem; }
            .stat-item { padding: 4px 10px; }
            button { padding: 10px 18px; font-size: 0.85rem; }
            .message-area { bottom: 100px; font-size: 0.8rem; white-space: normal; max-width: 80%; }
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="stats-panel">
            <div class="stat-item"><span>🪐</span> <span id="planetName">Planet</span></div>
            <div class="stat-item"><span>💎</span> <span id="points">0</span></div>
            <div class="stat-item"><span>🛡️</span> <span id="defense">10</span></div>
            <div class="stat-item"><span>📈</span> <span id="level">1</span></div>
        </div>
        
        <div class="action-buttons">
            <button id="collectBtn">✨ Собрать (+1)</button>
            <button id="upgradeBtn">🔧 Улучшить</button>
            <button id="sendMsgBtn">📡 Послать сигнал</button>
        </div>
        
        <div id="messageArea" class="message-area" style="opacity: 0;">✨ +1 ресурс</div>
    </div>

    <div id="chatModal" class="chat-modal">
        <h3 style="margin-bottom: 15px; text-align: center; color: white;">📡 Отправить сообщение</h3>
        <input type="text" id="recipientName" placeholder="Имя получателя" autocomplete="off">
        <textarea id="messageText" rows="3" placeholder="Ваше сообщение..." maxlength="200"></textarea>
        <button id="sendMessageBtn">🚀 Отправить ракету</button>
        <button id="closeModalBtn" style="margin-top: 5px; background: rgba(100,100,100,0.5);">Закрыть</button>
    </div>

    <!-- Используем CDN для Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Telegram WebApp (с защитой от ошибок при локальной разработке) ---
        let tg = null;
        let userName = "Explorer";
        
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    userName = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "Cosmonaut";
                }
            } else {
                console.log("Запуск вне Telegram");
                userName = "Tester_" + Math.floor(Math.random() * 1000);
            }
        } catch(e) {
            console.log("Ошибка Telegram WebApp:", e);
            userName = "Explorer";
        }
        
        document.getElementById('planetName').innerText = userName.substring(0, 12);

        // --- Игровые данные ---
        let gameData = {
            points: 0,
            defense: 10,
            level: 1
        };
        
        // --- Инициализация 3D сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010318);
        scene.fog = new THREE.FogExp2(0x010318, 0.0005);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 6);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Освещение ---
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        sunLight.position.set(10, 15, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);
        
        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);
        
        const backLight = new THREE.PointLight(0x4466ff, 0.4);
        backLight.position.set(-3, 2, -4);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xffaa66, 0.5);
        fillLight.position.set(3, 2, 4);
        scene.add(fillLight);
        
        // --- Создание текстуры планеты (упрощенная, но красивая) ---
        function createPlanetTexture(isNight = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Фон (океан)
            ctx.fillStyle = isNight ? '#1a2a4a' : '#3a7a5a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Континенты
            ctx.fillStyle = isNight ? '#4a6a8a' : '#8ab87a';
            const continents = [
                { x: 0.2, y: 0.3, w: 0.25, h: 0.2 },
                { x: 0.6, y: 0.2, w: 0.3, h: 0.25 },
                { x: 0.3, y: 0.6, w: 0.2, h: 0.2 },
                { x: 0.7, y: 0.7, w: 0.2, h: 0.15 },
                { x: 0.1, y: 0.8, w: 0.15, h: 0.12 }
            ];
            
            continents.forEach(cont => {
                ctx.beginPath();
                ctx.ellipse(cont.x * canvas.width, cont.y * canvas.height, 
                           cont.w * canvas.width / 2, cont.h * canvas.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Облака
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for(let i = 0; i < 60; i++) {
                ctx.beginPath();
                ctx.ellipse(Math.random() * canvas.width, Math.random() * canvas.height, 
                           20 + Math.random() * 40, 10 + Math.random() * 20, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Огни городов (только ночью)
            if(isNight) {
                ctx.fillStyle = '#ffdd88';
                for(let i = 0; i < 300; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 
                           2 + Math.random() * 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }
        
        const planetGeometry = new THREE.SphereGeometry(1.6, 128, 128);
        const planetMaterial = new THREE.MeshStandardMaterial({
            map: createPlanetTexture(false),
            roughness: 0.5,
            metalness: 0.1,
            emissive: new THREE.Color(0x111122),
            emissiveIntensity: 0.15
        });
        
        const planet = new THREE.Mesh(planetGeometry, planetMaterial);
        planet.castShadow = true;
        planet.receiveShadow = true;
        scene.add(planet);
        
        // Атмосфера
        const atmosGeometry = new THREE.SphereGeometry(1.68, 64, 64);
        const atmosMaterial = new THREE.MeshPhongMaterial({
            color: 0x88aaff,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
        scene.add(atmosphere);
        
        // --- Звезды (упрощенно, но много) ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 3000;
        const starPositions = new Float32Array(starCount * 3);
        for(let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Мелкие звезды
        const starSmallGeo = new THREE.BufferGeometry();
        const starSmallCount = 4000;
        const starSmallPos = new Float32Array(starSmallCount * 3);
        for(let i = 0; i < starSmallCount; i++) {
            starSmallPos[i*3] = (Math.random() - 0.5) * 600;
            starSmallPos[i*3+1] = (Math.random() - 0.5) * 300;
            starSmallPos[i*3+2] = (Math.random() - 0.5) * 200 - 100;
        }
        starSmallGeo.setAttribute('position', new THREE.BufferAttribute(starSmallPos, 3));
        const starSmallMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.05 });
        const starsSmall = new THREE.Points(starSmallGeo, starSmallMat);
        scene.add(starsSmall);
        
        // --- Летающие объекты ---
        const flyingObjects = [];
        
        // Астероиды
        for(let i = 0; i < 15; i++) {
            const astGeo = new THREE.DodecahedronGeometry(0.08);
            const astMat = new THREE.MeshStandardMaterial({ color: 0x886666, roughness: 0.7 });
            const asteroid = new THREE.Mesh(astGeo, astMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.2 + Math.random() * 0.8;
            asteroid.position.x = Math.cos(angle) * radius;
            asteroid.position.z = Math.sin(angle) * radius;
            asteroid.position.y = (Math.random() - 0.5) * 2;
            scene.add(asteroid);
            flyingObjects.push({
                obj: asteroid,
                speed: 0.002 + Math.random() * 0.003,
                radius: radius,
                angle: angle,
                ySpeed: 0.001 + Math.random() * 0.002
            });
        }
        
        // Спутники
        for(let i = 0; i < 8; i++) {
            const satGroup = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.12, 0.06, 0.18);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x99ccff, emissive: 0x2266aa });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            satGroup.add(body);
            const panelGeo = new THREE.BoxGeometry(0.25, 0.03, 0.1);
            const panelMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
            const panel1 = new THREE.Mesh(panelGeo, panelMat);
            panel1.position.x = 0.15;
            satGroup.add(panel1);
            const panel2 = panel1.clone();
            panel2.position.x = -0.15;
            satGroup.add(panel2);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.5 + Math.random() * 0.5;
            satGroup.position.x = Math.cos(angle) * radius;
            satGroup.position.z = Math.sin(angle) * radius;
            satGroup.position.y = (Math.random() - 0.5) * 1.5;
            scene.add(satGroup);
            flyingObjects.push({
                obj: satGroup,
                speed: 0.003 + Math.random() * 0.004,
                radius: radius,
                angle: angle,
                ySpeed: 0.0005
            });
        }
        
        // --- Смена дня и ночи ---
        let isNight = false;
        let nightTimer = 0;
        
        function toggleDayNight() {
            isNight = !isNight;
            const newTexture = createPlanetTexture(isNight);
            planetMaterial.map = newTexture;
            planetMaterial.needsUpdate = true;
            
            if(isNight) {
                sunLight.intensity = 0.25;
                ambientLight.intensity = 0.12;
                fillLight.intensity = 0.2;
                showMessage('🌙 Ночь на планете... Города зажглись!', '#88aaff');
            } else {
                sunLight.intensity = 1.0;
                ambientLight.intensity = 0.35;
                fillLight.intensity = 0.5;
                showMessage('☀️ День на планете!', '#ffcc88');
            }
        }
        
        setInterval(() => {
            toggleDayNight();
        }, 45000);
        
        // --- UI функции ---
        function updateUI() {
            document.getElementById('points').innerText = gameData.points;
            document.getElementById('defense').innerText = gameData.defense;
            document.getElementById('level').innerText = gameData.level;
        }
        
        function showMessage(msg, color = '#ffdd88') {
            const msgDiv = document.getElementById('messageArea');
            msgDiv.innerHTML = msg;
            msgDiv.style.color = color;
            msgDiv.style.opacity = '1';
            setTimeout(() => {
                msgDiv.style.opacity = '0';
            }, 2000);
        }
        
        function collectPoints() {
            gameData.points += 1;
            updateUI();
            showMessage('✨ +1 ресурс! ✨', '#aaffaa');
            if(tg) tg.HapticFeedback?.impactOccurred('light');
            
            // Визуальный эффект
            planetMaterial.emissiveIntensity = 0.6;
            setTimeout(() => { planetMaterial.emissiveIntensity = 0.15; }, 200);
        }
        
        function upgradeDefense() {
            const cost = gameData.defense * 10;
            if(gameData.points >= cost) {
                gameData.points -= cost;
                gameData.defense += 5;
                gameData.level += 1;
                updateUI();
                showMessage(`🛡 Защита +5! Уровень ${gameData.level}`, '#88ccff');
                if(tg) tg.HapticFeedback?.notificationOccurred('success');
                if(tg) tg.sendData(JSON.stringify({ action: 'upgrade', points: gameData.points, defense: gameData.defense, level: gameData.level }));
            } else {
                showMessage(`❌ Не хватает ${cost} очков!`, '#ff8888');
                if(tg) tg.HapticFeedback?.notificationOccurred('error');
            }
        }
        
        // Модальное окно
        const modal = document.getElementById('chatModal');
        document.getElementById('sendMsgBtn').onclick = () => modal.style.display = 'block';
        document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
        document.getElementById('sendMessageBtn').onclick = () => {
            const recipient = document.getElementById('recipientName').value.trim();
            const msg = document.getElementById('messageText').value.trim();
            if(recipient && msg) {
                showMessage(`🚀 Ракета с сообщением улетела к ${recipient}!`, '#ffdd88');
                if(tg) tg.sendData(JSON.stringify({ action: 'send_message', to: recipient, text: msg }));
                modal.style.display = 'none';
                document.getElementById('recipientName').value = '';
                document.getElementById('messageText').value = '';
                if(tg) tg.HapticFeedback?.notificationOccurred('success');
                
                // Визуальная ракета
                const rocketGeo = new THREE.CylinderGeometry(0.04, 0.08, 0.15);
                const rocketMat = new THREE.MeshStandardMaterial({ color: 0xff6644 });
                const rocket = new THREE.Mesh(rocketGeo, rocketMat);
                rocket.position.set(1.5, 0.8, 1.8);
                scene.add(rocket);
                let rocketX = 1.5;
                function flyRocket() {
                    rocketX += 0.08;
                    rocket.position.x = rocketX;
                    if(rocketX > 8) {
                        scene.remove(rocket);
                        return;
                    }
                    requestAnimationFrame(flyRocket);
                }
                flyRocket();
            } else {
                showMessage('❌ Введите имя и сообщение', '#ff8888');
            }
        };
        
        document.getElementById('collectBtn').onclick = collectPoints;
        document.getElementById('upgradeBtn').onclick = upgradeDefense;
        
        // --- Анимация ---
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Вращение планеты
            planet.rotation.y += 0.003;
            planet.rotation.x = Math.sin(time * 0.2) * 0.05;
            atmosphere.rotation.y = planet.rotation.y;
            
            // Движение летающих объектов
            flyingObjects.forEach(obj => {
                obj.angle += obj.speed;
                obj.obj.position.x = Math.cos(obj.angle) * obj.radius;
                obj.obj.position.z = Math.sin(obj.angle) * obj.radius;
                if(obj.ySpeed) {
                    obj.obj.position.y += obj.ySpeed;
                    if(Math.abs(obj.obj.position.y) > 1.5) obj.ySpeed *= -1;
                }
                obj.obj.rotation.x += 0.02;
                obj.obj.rotation.y += 0.03;
            });
            
            // Вращение звезд
            stars.rotation.y += 0.0002;
            starsSmall.rotation.x += 0.0001;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Адаптация к размеру окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Пассивный доход
        setInterval(() => {
            const passive = Math.floor(gameData.defense / 20) + 1;
            gameData.points += passive;
            updateUI();
            showMessage(`🌍 Пассивный доход +${passive}`, '#aaccff');
        }, 60000);
        
        updateUI();
        showMessage('🚀 Добро пожаловать в My Mini Planet!', '#88ffaa');
        
        console.log('3D игра успешно запущена!');
    </script>
</body>
</html>
